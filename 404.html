<!DOCTYPE html>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0b0c;
      color: #f4f4f5;

      display: flex;

      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }
    .wrap { position: relative; z-index: 1; }
    .glow {
      position: fixed; top: 50%; left: 50%;
      width: 640px; height: 640px; transform: translate(-50%, -50%);

    }

    .logo span { color: #d6d6db; }
    h1 {
      font-size: clamp(80px, 18vw, 180px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(120deg, #7c7c83, #fff 55%, #c9c9cd);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h2 { font-size: clamp(18px, 3vw, 24px); font-weight: 600; margin-top: 12px; }
    p { color: #8c8c93; font-size: 15px; margin: 16px auto 32px; max-width: 380px; line-height: 1.7; }
    a.btn {
      display: inline-block;
      background: #f5f5f6; color: #0b0b0c; text-decoration: none;
      font-weight: 700; font-size: 14px;
      padding: 14px 28px; border-radius: 100px;
      transition: background .25s ease, transform .25s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    a.btn:hover { background: #ffffff; transform: translateY(-2px); }
  </style>
</head>
